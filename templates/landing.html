{% extends "base.html" %}

{% block content %}
<div class="relative isolate px-6 pt-14 lg:px-8">
  <div class="mx-auto max-w-2xl py-32 sm:py-48 lg:py-56 text-center">
    <div class="text-center">
      <h1 class="text-4xl font-bold tracking-tight text-white sm:text-6xl" style="background: -webkit-linear-gradient(#fff, #9ca3af); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Build websites at the speed of thought</h1>
      <p class="mt-6 text-lg leading-8 text-gray-300">NeuraForge AI automatically generates, styles, and deploys completely custom websites in seconds using advanced LLMs and glassmorphic UI generation.</p>
      <div class="mt-10 flex items-center justify-center gap-x-6">
        <a href="{{ url_for('auth.register') }}" class="btn-primary" style="padding: 12px 24px; font-size: 1.1rem;">Start Building Free</a>
        <a href="{{ url_for('auth.login') }}" class="text-sm font-semibold leading-6 text-gray-300 hover:text-white transition-colors">Log in <span aria-hidden="true">→</span></a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
